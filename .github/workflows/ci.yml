name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Quality gates. Every push and PR must pass all of these before merge.
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the `wxt prepare` postinstall, generating .wxt types
      # that the type-check gate depends on.
      - run: npm ci

      - name: Format (prettier --check)
        run: npm run format:check

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run compile

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (wxt build)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3

      # Store-ready package (Chrome/Edge). Firefox is out of scope for now.
      - name: Zip (chrome/edge)
        run: npm run zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: .output/*.zip

  # E2E gate: loads the built extension into real Chromium (new headless).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E (build + playwright)
        run: npm run test:e2e
