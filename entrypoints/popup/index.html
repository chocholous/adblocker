<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stealth Content Hider</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header class="row">
        <h1>Content Hider</h1>
        <label class="switch">
          <input type="checkbox" id="enabled" />
          <span class="slider"></span>
        </label>
      </header>

      <label class="field">
        <span>Hide selectors <small>(display: none)</small></span>
        <textarea
          id="hideSelectors"
          rows="5"
          spellcheck="false"
          placeholder="[data-ad]&#10;.sponsored-content"
        ></textarea>
      </label>

      <label class="field">
        <span>Remove selectors <small>(detach from DOM)</small></span>
        <textarea
          id="removeSelectors"
          rows="3"
          spellcheck="false"
          placeholder=".paywall-overlay"
        ></textarea>
      </label>

      <label class="field">
        <span
          >Cosmetic filters
          <small>(uBO/EasyList, per-site &amp; procedural)</small></span
        >
        <textarea
          id="cosmeticFilters"
          rows="4"
          spellcheck="false"
          placeholder="example.com##.banner&#10;example.com##div.card:has-text(Sponsored)"
        ></textarea>
      </label>

      <label class="check">
        <input type="checkbox" id="spoofAntiAdblock" />
        <span>Spoof anti-adblock detection</span>
      </label>

      <label class="check">
        <input type="checkbox" id="dismissConsent" />
        <span>Dismiss cookie/consent walls (reject, else hide)</span>
      </label>

      <footer class="row">
        <button id="save" type="button">Save</button>
        <span id="status" class="status" aria-live="polite"></span>
      </footer>

      <hr class="sep" />

      <section class="pick">
        <button id="pick" type="button">Pick element to hide</button>
        <span id="pickStatus" class="status" aria-live="polite"></span>
      </section>

      <hr class="sep" />

      <section class="io">
        <span class="field"
          ><span
            >Backup <small>(export / import all settings)</small></span
          ></span
        >
        <div class="row io-actions">
          <button id="export" type="button" class="secondary">Export</button>
          <button id="import" type="button" class="secondary">Import</button>
        </div>
        <textarea
          id="ioText"
          rows="4"
          spellcheck="false"
          placeholder="Settings JSON appears here on Export; paste JSON here then click Import."
        ></textarea>
        <span id="ioStatus" class="status" aria-live="polite"></span>
      </section>

      <hr class="sep" />

      <section class="ai">
        <label class="field">
          <span>Authentication</span>
          <select id="aiAuthMethod">
            <option value="apiKey">API key (BYO)</option>
            <option value="oauth">Claude subscription (OAuth token)</option>
          </select>
        </label>

        <label class="field" id="apiKeyField">
          <span
            >Anthropic API key <small>(stored locally, not synced)</small></span
          >
          <input
            type="password"
            id="apiKey"
            placeholder="sk-ant-..."
            autocomplete="off"
          />
        </label>

        <label class="field" id="oauthField" hidden>
          <span
            >Claude OAuth token
            <small>(stored locally, not synced)</small></span
          >
          <input
            type="password"
            id="oauthToken"
            placeholder="sk-ant-oat..."
            autocomplete="off"
          />
        </label>

        <label class="field">
          <span>Model</span>
          <select id="aiModel">
            <option value="haiku">Haiku (fast, cheap)</option>
            <option value="sonnet">Sonnet (balanced)</option>
            <option value="opus">Opus (most capable)</option>
          </select>
        </label>

        <label class="check">
          <input type="checkbox" id="aiVision" />
          <span>Vision mode <small>(send a screenshot)</small></span>
        </label>

        <button id="cleanup" type="button" class="secondary">
          Clean up this page (AI)
        </button>
        <span id="aiStatus" class="status" aria-live="polite"></span>
        <div id="results" class="results"></div>
        <div class="row results-actions" id="resultsActions" hidden>
          <button id="saveRules" type="button">Save selected</button>
          <button id="clearPreview" type="button" class="secondary">
            Clear
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
